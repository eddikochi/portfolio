<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <rect width="1584" height="396" fill="#0d0d0f"/>

  <!-- Arcos carmim — direita -->
  <g fill="none">
    <circle cx="1380" cy="198" r="420" stroke="#CA6275" stroke-width="0.8" opacity="0.10"/>
    <circle cx="1380" cy="198" r="360" stroke="#CA6275" stroke-width="0.8" opacity="0.14"/>
    <circle cx="1380" cy="198" r="300" stroke="#CA6275" stroke-width="1"   opacity="0.20"/>
    <circle cx="1380" cy="198" r="240" stroke="#CA6275" stroke-width="1"   opacity="0.28"/>
    <circle cx="1380" cy="198" r="180" stroke="#CA6275" stroke-width="1.2" opacity="0.38"/>
    <circle cx="1380" cy="198" r="120" stroke="#D5798A" stroke-width="1.5" opacity="0.55"/>
  </g>

  <!-- Arcos carmim — esquerda espelhados, mais suaves -->
  <g fill="none">
    <circle cx="0" cy="198" r="240" stroke="#CA6275" stroke-width="0.8" opacity="0.08"/>
    <circle cx="0" cy="198" r="180" stroke="#CA6275" stroke-width="0.8" opacity="0.12"/>
    <circle cx="0" cy="198" r="120" stroke="#CA6275" stroke-width="1"   opacity="0.16"/>
  </g>

  <!-- Ponto central carmim -->
  <circle cx="1380" cy="198" r="18" fill="#CA6275" opacity="0.18"/>
  <circle cx="1380" cy="198" r="8"  fill="#CA6275" opacity="0.55"/>
  <circle cx="1380" cy="198" r="3"  fill="#D5798A" opacity="1"/>

  <!-- Tagline centralizada na área segura (x>220) -->
  <text x="792" y="162"
    text-anchor="middle"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="26" font-weight="400" letter-spacing="5"
    fill="#c8c4be">DIGITAL GROWTH  ·  CRO  ·  CRM  ·  ANALYTICS  ·  UX</text>

  <!-- Linha separadora carmim -->
  <line x1="340" y1="194" x2="1244" y2="194" stroke="#CA6275" stroke-width="0.5" opacity="0.30"/>

  <!-- Chips centralizados — linha única -->
  <g font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="14" fill="none">

    <!-- Chip 1: Salesforce -->
    <rect x="374" y="224" width="128" height="34" rx="17" stroke="#CA6275" stroke-width="0.9" opacity="0.55"/>
    <text x="438" y="246" text-anchor="middle" fill="#D5798A" font-weight="500">Salesforce</text>

    <!-- Chip 2: GA4 · GTM -->
    <rect x="516" y="224" width="128" height="34" rx="17" stroke="#CA6275" stroke-width="0.9" opacity="0.55"/>
    <text x="580" y="246" text-anchor="middle" fill="#D5798A" font-weight="500">GA4 · GTM</text>

    <!-- Chip 3: AEM -->
    <rect x="658" y="224" width="86"  height="34" rx="17" stroke="#CA6275" stroke-width="0.9" opacity="0.55"/>
    <text x="701" y="246" text-anchor="middle" fill="#D5798A" font-weight="500">AEM</text>

    <!-- Chip 4: CRO -->
    <rect x="758" y="224" width="80"  height="34" rx="17" stroke="#CA6275" stroke-width="0.9" opacity="0.55"/>
    <text x="798" y="246" text-anchor="middle" fill="#D5798A" font-weight="500">CRO</text>

    <!-- Chip 5: UX Discovery -->
    <rect x="852" y="224" width="148" height="34" rx="17" stroke="#CA6275" stroke-width="0.9" opacity="0.55"/>
    <text x="926" y="246" text-anchor="middle" fill="#D5798A" font-weight="500">UX Discovery</text>

    <!-- Chip 6: SEO Técnico -->
    <rect x="1014" y="224" width="134" height="34" rx="17" stroke="#CA6275" stroke-width="0.9" opacity="0.55"/>
    <text x="1081" y="246" text-anchor="middle" fill="#D5798A" font-weight="500">SEO Técnico</text>

  </g>

</svg>
